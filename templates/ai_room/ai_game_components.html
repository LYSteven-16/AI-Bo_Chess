<style>
#piece-action-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(250, 246, 239, 0.98);
    padding: 30px 40px;
    border: 4px solid var(--ink-brown);
    border-radius: 16px;
    z-index: 6000;
    text-align: center;
    box-shadow: 0 0 60px rgba(74, 124, 155, 0.5);
    font-family: 'KaiTi', 'STKaiti', 'FangSong', serif;
    min-width: 320px;
}

#piece-action-modal .modal-title {
    color: var(--ink-brown);
    margin: 0 0 20px 0;
    font-size: 24px;
    letter-spacing: 3px;
}

#piece-action-modal .modal-info {
    color: var(--ink-dark);
    margin: 0 0 25px 0;
    font-size: 16px;
}

#piece-action-modal .modal-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

#piece-action-modal .modal-buttons button {
    padding: 12px 30px;
    font-size: 18px;
    font-family: 'KaiTi', serif;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    min-width: 120px;
    border: 2px solid var(--ink-brown);
}

#piece-action-modal .modal-buttons .btn-move {
    background: linear-gradient(135deg, #4a7c59 0%, #3d6b4a 100%);
    color: white;
}

#piece-action-modal .modal-buttons .btn-attack {
    background: linear-gradient(135deg, var(--ink-red) 0%, #6b1d00 100%);
    color: white;
}

#piece-action-modal .modal-buttons .btn-cancel {
    background: linear-gradient(135deg, #888 0%, #666 100%);
    color: white;
}

#piece-action-modal .modal-hint {
    color: #888;
    font-size: 14px;
    margin: 15px 0 0 0;
}
</style>

<div id="combat-modal">
    <h2 id="combat-result"></h2>
    <div id="combat-details"></div>
    <button id="combat-confirm-btn" onclick="dismissCombatModal()">确 定</button>
</div>

<div id="piece-action-modal" style="display: none;">
    <h2 id="piece-action-title" class="modal-title"></h2>
    <div id="piece-action-info" class="modal-info"></div>
    <div class="modal-buttons">
        <button id="btn-action-move" class="btn-move" onclick="selectPieceAction('move')">移动</button>
        <button id="btn-action-attack" class="btn-attack" onclick="selectPieceAction('attack')">攻击</button>
        <button class="btn-cancel" onclick="cancelPieceAction()">取消</button>
    </div>
    <p class="modal-hint">点击空白处或按 ESC 键也可取消选择</p>
</div>

<div id="restore-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(250, 246, 239, 0.98); padding:50px; border:4px solid var(--ink-brown); border-radius:16px; z-index:8000; text-align:center; box-shadow: 0 0 60px rgba(74, 124, 155, 0.5); font-family: 'KaiTi', 'STKaiti', 'FangSong', serif;">
    <h2 style="color: var(--ink-brown); margin:0 0 20px 0; font-size:28px; letter-spacing:5px;">检测到存档</h2>
    <p style="color: var(--ink-dark); margin:0 0 30px 0; font-size:18px;">是否继续上局游戏？</p>
    <div style="display:flex; justify-content:center; gap:20px;">
        <button onclick="restoreFromSave()" style="background:linear-gradient(135deg, #4a7c59 0%, #3d6b4a 100%); color:white; border:2px solid var(--ink-brown); padding:12px 30px; font-size:18px; font-family: 'KaiTi', serif; border-radius:8px; cursor:pointer; letter-spacing:3px;">继续游戏</button>
        <button onclick="giveUpSave()" style="background:linear-gradient(135deg, var(--ink-red) 0%, #6b1d00 100%); color:white; border:2px solid var(--ink-brown); padding:12px 30px; font-size:18px; font-family: 'KaiTi', serif; border-radius:8px; cursor:pointer; letter-spacing:3px;">重新开始</button>
    </div>
</div>

<div id="strategy-card-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(250, 246, 239, 0.98); padding:40px; border:4px solid var(--ink-brown); border-radius:16px; z-index:7000; text-align:center; box-shadow: 0 0 60px rgba(74, 124, 155, 0.5); font-family: 'KaiTi', 'STKaiti', 'FangSong', serif;">
    <h2 id="strategy-card-title" style="color:var(--ink-brown); margin:0 0 20px 0; font-size:28px; letter-spacing:5px;"></h2>
    <p id="strategy-card-desc" style="color:var(--ink-dark); margin:0 0 30px 0; font-size:16px;"></p>
    <div id="strategy-card-buttons" style="display:flex; justify-content:center; gap:20px;"></div>
</div>

<div id="roll-animation" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(250, 246, 239, 0.98); padding:40px; border:4px solid var(--ink-brown); border-radius:12px; z-index:2100; text-align:center; box-shadow: 0 0 40px rgba(74, 124, 155, 0.4);">
    <h2 id="roll-title" style="color: var(--ink-brown); margin-top:0; font-size:24px;">🎲 掷采中...</h2>
    <div id="dice-animation" style="display:flex; justify-content:center; gap:10px; margin:30px 0;"></div>
</div>

<div id="zero-roll-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(250, 246, 239, 0.98); padding:50px; border:4px solid var(--ink-brown); border-radius:16px; z-index:6000; text-align:center; box-shadow: 0 0 60px rgba(74, 124, 155, 0.5);">
    <div style="font-size:64px; margin-bottom:20px; animation: shake 0.5s ease-in-out;">😢</div>
    <h2 style="color: var(--ink-red); margin:0 0 15px 0; font-size:28px; font-family: 'KaiTi', serif; letter-spacing:5px;">运道不济</h2>
    <p style="color: var(--ink-brown); margin:0 0 30px 0; font-size:18px; font-family: 'KaiTi', serif;">掷采为零，此回合无步可用</p>
    <p style="color: var(--ink-dark); margin:0 0 30px 0; font-size:16px; font-family: 'KaiTi', serif;">莫丧锐气，胜负未分</p>
    <button onclick="closeZeroRollModal()" style="background:linear-gradient(135deg, var(--ink-red) 0%, #6b1d00 100%); color:white; border:2px solid var(--ink-brown); padding:12px 40px; font-size:18px; font-family: 'KaiTi', serif; border-radius:8px; cursor:pointer; letter-spacing:3px;">继续战斗</button>
</div>
